# Shared Blackfly camera settings — sourced by all scripts in this folder.

# Network — sensor network (NetworkManager: sensor network)
ETH="enx00e04cf5fd7c"
HOST_IP="192.168.0.2"
LINK_LOCAL="169.254.0.10/16"   # secondary on sensor NIC; needed when cams fall back to 169.254.x

# Static camera IPs (run once after switch reset: sudo setup_blackfly_static_ips.sh)
CAM_0_IP="192.168.0.1"   # use .3 for cam1 when both connected
CAM_1_IP="192.168.0.3"   # solo: run setup with only one cam, or temporarily set to .1

# Cameras (from: arv-tool-0.8 list)
CAM_0="Point Grey Research-Blackfly BFLY-PGE-09S2C-13125051"   # serial ...5051 color
CAM_1="Point Grey Research-Blackfly BFLY-PGE-09S2M-13294999"   # serial ...4999 mono

CAM_0_PIXEL_FORMAT="BayerRG8"
CAM_1_PIXEL_FORMAT="Mono8"

# Mono cam exposure (µs) — live sensor was stuck saturated without explicit Timed mode
CAM_1_EXPOSURE_US=10000
CAM_1_GAIN_DB=0

CAM_0_TOPIC="/cam_0/image_raw"
CAM_1_TOPIC="/cam_1/image_raw"
CAM_0_FRAME_ID="cam_0_optical_frame"
CAM_1_FRAME_ID="cam_1_optical_frame"

# Default single-camera alias (preview cam0)
CAM="${CAM:-$CAM_0}"

# GigE packet size — 1440 fixes the ~2 s stream crash
PACKET_SIZE=1440
GST_PACKET_SIZE=1400

# Resolution: 0 = full (1288x728), 1 = 640x480
LOW_BANDWIDTH=0

# White balance — color cam only
BALANCE_BLUE=10
BALANCE_RED=1.0
CAM_SATURATION=130

GST_SATURATION=1.0
GST_HUE=-0.1
